apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: flask-eks-cluster
  region: eu-west-1
  version: "1.31"

availabilityZones:
  - eu-west-1a
  - eu-west-1b
  - eu-west-1c

managedNodeGroups:
  - name: flask-nodes
    instanceTypes:
      - t3.medium
      - t3.large
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 20
    iam:
      withAddonPolicies:
        cloudWatch: true
        autoScaler: true

iam:
  withOIDC: true
